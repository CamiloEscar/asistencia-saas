# Production nginx config for asistencia-saas (single-tenant).
# The operator provides a domain cert (mounted at
# /etc/nginx/ssl/server.pem|key). We consume it read-only — we do NOT
# generate or renew certs ourselves.
#
# Architecture:
#   <operator-domain> → nginx (TLS termination, gzip, security headers)
#     ├── /api/*  → proxy to api:3000
#     ├── /health → proxy to api:3000 (used by Docker healthcheck)
#     └── /*      → serve SPA static files from web container
#                  (try_files fallback to /index.html for client routing)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 5M; # bulk CSV import limit

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # Upstreams
    upstream api_upstream {
        server api:3000;
        keepalive 32;
    }

    upstream web_upstream {
        server web:80;
        keepalive 16;
    }
}
