# Server block for asistencia-saas.
# HTTP → HTTPS redirect, then the HTTPS server.

# ─── HTTP → HTTPS redirect ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name *.app.com app.com;

    # ACME challenge path (for cert renewal, if user bot uses certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        # Plain HTTP health endpoint for monitoring
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name *.app.com app.com;

    ssl_certificate /etc/nginx/ssl/wildcard.pem;
    ssl_certificate_key /etc/nginx/ssl/wildcard.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers (defense in depth; Helmet also adds them in the API)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; font-src 'self' data:; connect-src 'self' https://*.app.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ─── API proxy ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # Pass through the tenant subdomain hint
        # (extracted from $host by stripping .app.com)
        set $tenant_subdomain $host;
        if ($host ~* "^([^.]+)\.app\.com$") {
            set $tenant_subdomain $1;
        }
        proxy_set_header X-Tenant-Subdomain $tenant_subdomain;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # No client-side buffering (for SSE if we ever add it)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check (no auth)
    location = /health {
        proxy_pass http://api_upstream/health;
        access_log off;
    }

    # ─── SPA static files ───────────────────────────────────────
    # Serve the React SPA. For client-side routes, fall back to
    # /index.html so React Router can take over.
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Cache static assets aggressively
        location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
            proxy_pass http://web_upstream;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
