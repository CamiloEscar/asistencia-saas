# nginx config for the Vite SPA runtime container.
# - SPA fallback: any unmatched path returns index.html (React Router).
# - Long cache for hashed assets (under /assets/), no cache for index.html.
# - Gzip for text assets.
# - Health endpoint at /healthz.

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
  gzip_comp_level 6;

  # Security headers (defense in depth; API sets its own).
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Health check for Docker / orchestrator.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Hashed assets — long cache.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html — never cache (so deploys are picked up).
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # SPA fallback: everything else → index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
