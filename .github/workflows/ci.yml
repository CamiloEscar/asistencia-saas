name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # ─── Single install job that caches pnpm store ──────────────────────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  # ─── Lint + typecheck + unit tests (fast) ──────────────────────────────
  validate:
    name: Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.12.1 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm -r test -- --reporter=verbose

  # ─── Build (verifies everything compiles) ───────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.12.1 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @asistencia/api exec prisma generate --schema=./prisma/schema.prisma || true

      - name: Build
        run: pnpm -r build

  # ─── Backend E2E + cross-tenant isolation (slow, needs DB) ────────────
  api-e2e:
    name: API E2E (cross-tenant isolation)
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: asistencia
          POSTGRES_PASSWORD: asistencia
          POSTGRES_DB: asistencia_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://asistencia:asistencia@localhost:5432/asistencia_test?schema=public
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY || 'placeholder-not-used-in-e2e' }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY || 'placeholder-not-used-in-e2e' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.12.1 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm --filter @asistencia/api exec prisma migrate deploy --schema=./prisma/schema.prisma || true

      - name: API E2E
        run: pnpm --filter @asistencia/api test:e2e -- --passWithNoTests
